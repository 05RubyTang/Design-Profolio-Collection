<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruby Tang · 设计作品集</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
    background: #F7F7F8;
    color: #1A1A1A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #FF2442 0%, #FF6B81 60%, #FFB3BE 100%);
    padding: 60px 40px 48px;
    text-align: center;
    color: white;
  }
  header h1 { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
  header p { font-size: 15px; opacity: 0.88; }

  main { max-width: 900px; margin: 48px auto; padding: 0 24px; flex: 1; width: 100%; }
  h2 { font-size: 18px; font-weight: 800; color: #1A1A1A; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #EAEAEA; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }

  .card {
    background: white;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    display: block;
    border: 2px solid transparent;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.12); border-color: #FF2442; }
  .card-icon { font-size: 36px; margin-bottom: 14px; }
  .card-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 14px; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: #FFF0F3; color: #FF2442; }

  footer { text-align: center; padding: 32px 20px; color: #aaa; font-size: 13px; border-top: 1px solid #EAEAEA; background: white; }
  footer strong { color: #FF2442; }
</style>
</head>
<body>

<header>
  <h1>🎓 Ruby Tang</h1>
  <p>设计资源 · 保研指南 · 作品集参考</p>
</header>

<main>
  <h2>📂 所有项目</h2>
  <div class="grid">

    <a class="card" href="./xuantizhinan/">
      <div class="card-icon">📋</div>
      <div class="card-title">设计保研作品集选题指南</div>
      <div class="card-desc">7大设计方向 · 40+小红书真实上岸案例聚合 · 覆盖同济/清华/浙大等985院校</div>
      <div class="card-meta">
        <span class="tag">工业设计</span>
        <span class="tag">交互设计</span>
        <span class="tag">视觉传达</span>
      </div>
    </a>

    <!-- 更多网站卡片将陆续添加 -->

  </div>
</main>

<footer>
  <strong>Ruby Tang</strong> · 设计作品集门户
</footer>

</body>
</html>
